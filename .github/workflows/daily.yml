name: Daily Design Brief

on:
  # 主觸發：外部 Vercel Cron 每天台北 08:00 (UTC 00:00) 透過 workflow_dispatch
  workflow_dispatch:
  # 備援：GitHub 內建 schedule，台北 10:00 (UTC 02:00)。
  # 若 Vercel Cron 已在 00:00 跑過，下方 dedup step 會偵測 data.json 已是今天
  # 且 event=schedule → 自動 skip，不會重複產生。
  # schedule 可能延遲數分鐘~數小時，但可避免 Vercel 單點故障時連續多天空白。
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx==0.28.1 anthropic==0.92.0 groq==1.4.0

      - name: Ensure ffmpeg (for podcast audio → Whisper segmentation)
        run: which ffmpeg || sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check if already ran today
        id: dedup
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          EXISTING=$(python3 -c "import json; print(json.load(open('data.json')).get('date',''))" 2>/dev/null || echo "")
          if [ "$TODAY" = "$EXISTING" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Already generated for $TODAY, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch tweets
        if: steps.dedup.outputs.skip != 'true'
        env:
          TWITTER_TOKEN: ${{ secrets.TWITTER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_tweets.py

      - name: Fetch Product Hunt launches
        if: steps.dedup.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PRODUCTHUNT_API_TOKEN: ${{ secrets.PRODUCTHUNT_API_TOKEN }}
        run: python fetch_producthunt.py

      - name: Fetch podcast financial brief
        if: steps.dedup.outputs.skip != 'true'
        continue-on-error: true   # 失敗不可中斷整批早報
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python fetch_podcast.py

      - name: Generate index.html and daily brief
        if: steps.dedup.outputs.skip != 'true'
        run: python generate_html.py

      - name: Generate daily markdown
        if: steps.dedup.outputs.skip != 'true'
        run: python generate_md.py

      - name: Commit and push
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive.json data.json briefs/
          # podcast_state.json 可能尚未產生（首次 / podcast 步驟失敗）→ 存在才加
          [ -f podcast_state.json ] && git add podcast_state.json || true
          # usage_log.json：每日 token/轉錄花費累計，存在才加
          [ -f usage_log.json ] && git add usage_log.json || true
          git diff --staged --quiet || git commit -m "chore: daily brief $(date +'%Y-%m-%d')"
          git push

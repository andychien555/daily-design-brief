name: Daily Design Brief

on:
  # 由外部 Vercel Cron 每天台北 08:00 (UTC 00:00) 透過 workflow_dispatch 觸發
  # GitHub Actions schedule 太不可靠，已改用 Vercel Cron 主導
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx==0.28.1 anthropic==0.92.0

      - name: Check if already ran today
        id: dedup
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          EXISTING=$(python3 -c "import json; print(json.load(open('data.json')).get('date',''))" 2>/dev/null || echo "")
          if [ "$TODAY" = "$EXISTING" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Already generated for $TODAY, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch tweets
        if: steps.dedup.outputs.skip != 'true'
        env:
          TWITTER_TOKEN: ${{ secrets.TWITTER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_tweets.py

      - name: Fetch Product Hunt launches
        if: steps.dedup.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_producthunt.py

      - name: Generate index.html and daily brief
        if: steps.dedup.outputs.skip != 'true'
        run: python generate_html.py

      - name: Generate daily markdown
        if: steps.dedup.outputs.skip != 'true'
        run: python generate_md.py

      - name: Commit and push
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive.json data.json briefs/
          git diff --staged --quiet || git commit -m "chore: daily brief $(date +'%Y-%m-%d')"
          git push

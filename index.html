<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product & Design 每日早報</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f2ec;
      color: #0f0e0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      margin-bottom: 1rem;
    }
    h1 em { font-style: italic; color: #c8460a; }
    p { color: #8a8070; font-size: .9rem; line-height: 1.7; max-width: 400px; }
    .dot { width: 8px; height: 8px; background: #c8460a; border-radius: 50%; margin: 1.5rem auto; }
  </style>
</head>
<body>
  <h1>Product &amp; <em>Design</em></h1>
  <div class="dot"></div>
  <p>每日早報將於明日 09:00 (UTC+8) 自動更新<br>請明天再來 ☺</p>
</body>
</html>
